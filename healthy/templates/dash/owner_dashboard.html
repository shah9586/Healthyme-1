{% extends 'dash/dashboard_base.html' %}

{% block content %}

<h2>Admin Analytics Overview 📊</h2>

<div class="stats-grid">

    <div class="stat-card">
        <p>Total Users</p>
        <h2>{{ total_users }}</h2>
    </div>

    <div class="stat-card">
        <p>Active Users</p>
        <h2>{{ active_users }}</h2>
    </div>

    <div class="stat-card">
        <p>Total Reports</p>
        <h2>{{ total_reports }}</h2>
    </div>

</div>

<div class="info-card">
    <h3>System Status</h3>
    <p>HealthyMe platform is running smoothly 🚀</p>
</div>

{% endblock %}
