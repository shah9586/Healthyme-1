{% extends 'core/base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Your HealthyMe Account 💚</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Signup</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
</div>
{% endblock %}
