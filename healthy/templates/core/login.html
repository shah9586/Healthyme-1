{% extends 'core/base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Login to HealthyMe 🌿</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Login</button>
        </form>

        <div class="auth-footer">
            Don’t have an account? <a href="{% url 'signup' %}">Signup</a>
        </div>
    </div>
</div>
{% endblock %}
