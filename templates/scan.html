<!DOCTYPE html>
<html>
<head>
    <title>Scan Product - HealthyMe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef7f1;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 460px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #1f8f4d;
            font-size: 34px;
        }

        .subtext {
            color: #666;
            font-size: 14px;
            margin-bottom: 18px;
        }

        #reader {
            width: 100%;
            min-height: 120px;
            margin: 15px auto;
            border-radius: 12px;
            overflow: hidden;
        }

        .barcode-box {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            margin: 16px 0;
            word-break: break-word;
            text-align: center;
        }

        .barcode-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            background: #2ecc71;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #27ae60;
        }

        .btn.secondary {
            background: #95a5a6;
        }

        .btn.secondary:hover {
            background: #7f8c8d;
        }

        .section-title {
            text-align: left;
            font-size: 18px;
            margin: 18px 0 8px;
            color: #222;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-top: 8px;
        }

        .analyze-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            font-size: 16px;
        }

        .note {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            text-align: left;
            line-height: 1.5;

            .back-btn {
    display: inline-block;
    padding: 10px 18px;
    background: #2ecc71;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.3s;
}

.back-btn:hover {
    background: #27ae60;
    transform: scale(1.05);
}
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Scan Product</h2>
    <p class="subtext">Scan barcode or enter product name.</p>

    <form method="POST" action="{% url 'scan' %}">
        {% csrf_token %}

<div id="reader"></div>

<div class="barcode-box">
    <div class="barcode-title">Detected Barcode</div>
    <div id="barcodeText">Not scanned yet</div>
</div>

<input type="hidden" name="barcode" id="barcodeInput">

        <div class="btn-row">
           <button type="button" class="btn" onclick="startScanner()">Start Barcode Scan</button>
           <button type="button" class="btn secondary" onclick="stopScanner()">Stop</button>
        </div>

        <div class="section-title">Or Enter Product Name</div>
        <input type="text" name="product_name" id="productName" placeholder="Example: Hide & Seek">

        <button type="submit" class="btn analyze-btn">Analyze Product</button>
    </form>
 <div style="text-align:center; margin-top:15px;">
    <a href="/dashboard/" class="back-btn">⬅ Back to Dashboard</a>
</div>
    <div class="note">
        Barcode is best. If barcode is not found, enter the product name manually.
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    let html5QrCode = null;
    let scannerRunning = false;

    async function startScanner() {
        try {
            if (scannerRunning) return;

            const readerEl = document.getElementById("reader");
            const barcodeTextEl = document.getElementById("barcodeText");
            const barcodeInputEl = document.getElementById("barcodeInput");

            if (!readerEl || !barcodeTextEl || !barcodeInputEl) {
                alert("Scanner elements not found in page.");
                return;
            }

            const devices = await Html5Qrcode.getCameras();
            if (!devices || devices.length === 0) {
                alert("No camera found on this device.");
                return;
            }

            html5QrCode = new Html5Qrcode("reader");

            const cameraId = devices[0].id; // laptop webcam
            const config = {
                fps: 10,
                qrbox: { width: 280, height: 140 },
                aspectRatio: 1.6
            };

            await html5QrCode.start(
                cameraId,
                config,
                (decodedText) => {
                    if (decodedText && decodedText.length >= 8) {
                        barcodeTextEl.innerText = decodedText;
                        barcodeInputEl.value = decodedText;
                        stopScanner();
                    }
                },
                (errorMessage) => {
                    // ignore scan noise
                }
            );

            scannerRunning = true;
            console.log("Scanner started");

        } catch (err) {
            console.log("SCANNER ERROR:", err);
            alert("Scanner failed: " + err);
        }
    }

    async function stopScanner() {
        try {
            if (html5QrCode && scannerRunning) {
                await html5QrCode.stop();
                await html5QrCode.clear();
                scannerRunning = false;
                console.log("Scanner stopped");
            }
        } catch (err) {
            console.log("STOP ERROR:", err);
        }
    }
</script>

</body>
</html>
