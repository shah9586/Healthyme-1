<!DOCTYPE html>
<html>
<head>
    <title>Scan Product</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8fdf5, #ffffff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h2 {
            color: #27ae60;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            border: none;
            background: #27ae60;
            color: white;
            border-radius: 25px;
            cursor: pointer;
        }

        .divider {
            margin: 15px 0;
            color: #888;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f4fdf7;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Scan Your Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="image" required>
        <button type="submit">Scan Product</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>Health Score: {{ result.score }}/100</h3>

        <p><b>Ingredients Detected:</b></p>
        <pre>{{ result.raw_text }}</pre>

        <p><b>Issues Found:</b></p>
        <ul>
            {% for i in result.issues %}
            <li>{{ i }}</li>
            {% endfor %}
        </ul>

        <p><b>Suggestion:</b> {{ result.suggestion }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
