<!DOCTYPE html>
<html>
<head>
    <title>Community - HealthyMe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef7f1;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #27ae60;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .post {
            background: #f8f8f8;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .user {
            font-weight: bold;
            color: #27ae60;
        }

        .time {
            font-size: 12px;
            color: #888;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            background: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Community 💬</h1>

    <!-- POST FORM -->
    <form method="POST">
        {% csrf_token %}
        <textarea name="content" placeholder="Share your health tip..."></textarea>
        <button type="submit">Post</button>
    </form>

    <!-- POSTS -->
    {% for post in posts %}
        <div class="post">
            <div class="user">{{ post.user.username }}</div>
            <p>{{ post.content }}</p>
            <div class="time">{{ post.created_at }}</div>
        </div>
    {% empty %}
        <p>No posts yet. Be the first!</p>
    {% endfor %}

    <a href="/dashboard/" class="back-btn">Back to Dashboard</a>
</div>

</body>
</html>
