<!DOCTYPE html>
<html>
<head>
    <title>Community - HealthyMe</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            background: linear-gradient(
                rgba(0, 0, 0, 0.3),
                rgba(0, 0, 0, 0.3)    ),
            url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c");

            background-size: cover;
            background-position: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Floating elements */
        .floating {
            position: fixed;
            font-size: 55px;
            opacity: 0.45;
            animation: float 12s infinite linear;
        }

        .f2 { top: 80%; left: 10%; }
        .f1 { top: 50%; right: 8%; }
        .f3 { bottom: 85%; left: 12%; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
            100% { transform: translateY(0); }
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease;
            position: relative;
            z-index: 2;
        }

        h1 {
            text-align: center;
            color: #1f8f4d;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.4);
        }

        button {
            background: linear-gradient(90deg, #1f8f4d, #2ecc71);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .post {
            background: #f9f9f9;
            padding: 14px;
            border-radius: 12px;
            margin-top: 15px;
            transition: 0.3s;
            border-left: 5px solid #2ecc71;
        }

        .post:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        .user {
            font-weight: bold;
            color: #1f8f4d;
            margin-bottom: 5px;
        }

        .time {
            font-size: 12px;
            color: #888;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            background: linear-gradient(90deg, #1f8f4d, #2ecc71);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <!-- Floating icons -->
<div class="floating f1">📩</div>
<div class="floating f2">🗨️</div>
<div class="floating f3">📢</div>

    <div class="container">
        <h1>💬 Community</h1>

        <!-- POST FORM -->
        <form method="POST">
            {% csrf_token %}
            <textarea name="content" placeholder="Share your health tip..."></textarea>
            <button type="submit">Post</button>
        </form>

        <!-- POSTS -->
        {% for post in posts %}
            <div class="post">
                <div class="user">👤 {{ post.user.username }}</div>
                <p>{{ post.content }}</p>
                <div class="time">🕒 {{ post.created_at }}</div>
            </div>
        {% empty %}
            <p style="text-align:center;">No posts yet. Be the first! 🚀</p>
        {% endfor %}

        <a href="/dashboard/" class="back-btn">⬅ Back to Dashboard</a>
    </div>

</body>
</html>
