<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - HealthyMe</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;

            background: 
                linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
                url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092");

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Floating Packaged Items */
        .floating-item {
            position: fixed;
            font-size: 34px;
            opacity: 0.18;
            animation: floatMove 9s infinite ease-in-out;
            z-index: 0;
        }

        .item1 { top: 12%; left: 6%; animation-delay: 0s; }
        .item2 { top: 22%; right: 8%; animation-delay: 2s; }
        .item3 { bottom: 18%; left: 10%; animation-delay: 4s; }
        .item4 { bottom: 12%; right: 12%; animation-delay: 1s; }

        @keyframes floatMove {
            0% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
            100% { transform: translateY(0); }
        }

        /* Navbar */
        .topbar {
            background: linear-gradient(90deg, #42c273, #30b76d);
            color: white;
            padding: 18px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            position: relative;
            z-index: 2;
        }

        .topbar h2 {
            margin: 0;
            font-size: 26px;
        }

        .back-btn {
            padding: 10px 18px;
            background: white;
            color: #092916;
            border-radius: 10px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #1f8f4d;
            color: white;
            transform: translateY(-3px);
        }

        /* Container */
        .container {
            width: 92%;
            margin: 40px auto;
            position: relative;
            z-index: 2;
            animation: fadeUp 0.8s ease;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 22px;
            margin-bottom: 28px;
        }

        .summary-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-6px);
        }

        .summary-card h3 {
            margin: 0;
            color: #7fc99e;
        }

        .summary-card p {
            font-size: 26px;
            font-weight: bold;
        }

        /* Main Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: #13281c;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        th {
            background: linear-gradient(90deg, #0bd365, #3d8157);
            color: white;
        }

        tr:hover {
            background: #f5fff8;
        }

        /* Buttons */
        .action-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-right: 5px;
        }

        .edit-btn {
            background: #f1b656;
            color: white;
        }

        .delete-btn {
            background: #d41212;
            color: white;
        }

        .edit-btn:hover,
        .delete-btn:hover {
            transform: scale(1.05);
        }

        /* Animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media(max-width:768px){
            .topbar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- Floating Elements -->
    <div class="floating-item item1">🥤</div>
    <div class="floating-item item2">🍫</div>
    <div class="floating-item item3">🍪</div>
    <div class="floating-item item4">📦</div>

    <!-- Navbar -->
    <div class="topbar">
        <h2>👨‍💼 HealthyMe Admin Dashboard</h2>
        <a href="/admin/" class="back-btn">⬅ Back to Admin</a>
    </div>

    <div class="container">

        <!-- Summary -->
        <div class="summary-grid">
            <div class="summary-card">
                <h3>👥 Total Users</h3>
                <p>{{ users|length }}</p>
            </div>

            <div class="summary-card">
                <h3>🛡️ Admin Control</h3>
                <p>Active</p>
            </div>

            <div class="summary-card">
                <h3>📊 Management</h3>
                <p>Ready</p>
            </div>
        </div>

        <!-- User Table -->
        <div class="card">
            <h3>Users List</h3>

            <div class="table-wrapper">
                <table>
                    <tr>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Contact</th>
                        <th>Actions</th>
                    </tr>

                    {% for user in users %}
                    <tr>
                        <td>{{ user.email }}</td>
                        <td>{{ user.first_name }} {{ user.last_name }}</td>
                        <td>{{ user.contact }}</td>

                        <td>
                            <a href="/edit-user/{{ user.id }}/">
                                <button class="action-btn edit-btn">Edit</button>
                            </a>

                            <a href="/delete-user/{{ user.id }}/" onclick="return confirm('Delete user?')">
                                <button class="action-btn delete-btn">Delete</button>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}

                </table>
            </div>
        </div>

    </div>

</body>
</html>
