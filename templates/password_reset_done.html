<!DOCTYPE html>
<html>
<head>
    <title>Email Sent - HealthyMe</title>

    <style>
        body {
            font-family: Arial;
            background: #eef7f1;
            margin: 0;
        }

        /* 🔹 NAVBAR */
        .navbar {
            background: #27ae60;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
        }

        .login-btn {
            background: white;
            color: #27ae60;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #1abc9c;
            color: white;
        }

        /* 🔹 CARD */
        .card {
            background: white;
            padding: 30px;
            max-width: 500px;
            margin: 100px auto;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #27ae60;
        }
    </style>
</head>

<body>

<!-- 🔹 NAVBAR -->
<div class="navbar">
    <div class="logo">HealthyMe</div>
    <a href="/login/" class="login-btn">Login</a>
</div>

<!-- 🔹 CONTENT -->
<div class="card">
    <h2>Reset Link Sent</h2>
    <p>Please check your email for the password reset link.</p>
</div>

</body>
</html>
