<!DOCTYPE html>
<html>
<head>
    <title>Login with OTP - HealthyMe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef7f1;
        }
        .box {
            width: 380px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #27ae60;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
        .back {
            display: block;
            margin-top: 12px;
            text-align: center;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login with OTP</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Enter Email or Contact Number" required>
            <button type="submit">Send OTP</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <a href="/login/" class="back">Back to Password Login</a>
    </div>
</body>
</html>
