<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - HealthyMe</title>
</head>
<body style="font-family:Arial; background:#eef7f1; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
    <div style="background:white; padding:30px; border-radius:18px; width:420px; box-shadow:0 8px 20px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; color:#27ae60;">Reset Password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width:100%; padding:12px; background:#2ecc71; color:white; border:none; border-radius:8px;">Reset Password</button>
        </form>
    </div>
</body>
</html>
