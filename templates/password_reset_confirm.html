<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - HealthyMe</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 18px;
            width: 420px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            animation: fadeIn 0.6s ease;
        }

        h2 {
            text-align: center;
            color: #27ae60;
            margin-bottom: 20px;
        }

        form p {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #444;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #27ae60;
            box-shadow: 0 0 5px rgba(39,174,96,0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #27ae60;
            transform: scale(1.03);
        }

        .extra {
            text-align: center;
            margin-top: 15px;
        }

        .extra a {
            text-decoration: none;
            color: #27ae60;
            font-size: 14px;
        }

        .extra a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🔐 Reset Password</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset Password</button>
    </form>

    <div class="extra">
        <a href="/login/">⬅ Back to Login</a>
    </div>
</div>

</body>
</html>
