<!DOCTYPE html>
<html>
<head>
    <title>Ingredients - HealthyMe</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            background: linear-gradient(
                rgba(0, 0, 0, 0.3),
                rgba(0, 0, 0, 0.3)
            ),
            url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c");

            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease;
        }

        h1 {
            text-align: center;
            color: #1f8f4d;
            margin-bottom: 20px;
        }

        .item {
            background: #fff3f3;
            padding: 14px;
            border-left: 5px solid #e74c3c;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            background: #154b2c;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #45825e;
            transform: scale(1.05);
        }

        .center {
            text-align: center;
        }

        /* Floating elements */
        .floating {
            position: fixed;
            font-size: 80px;
            opacity: 0.45;
            animation: float 12s infinite linear;
        }

        .f1 { top: 15%; left: 5%; animation-delay: 0s; }
        .f2 { top: 60%; left: 90%; animation-delay: 3s; }
        .f3 { top: 80%; left: 25%; animation-delay: 6s; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
            100% { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <!-- Floating icons -->
    <div class="floating f1">🥤</div>
    <div class="floating f2">🍫</div>
    <div class="floating f3">🍪</div>

    <div class="container">
        <h1>⚠️ Harmful Ingredients Found</h1>

        {% for item in harmful_items %}
            <div class="item">❌ {{ item }}</div>
        {% empty %}
            <p style="text-align:center;">✅ No harmful ingredients found yet.</p>
        {% endfor %}

        <div class="center">
            <a href="/dashboard/" class="btn">⬅ Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
