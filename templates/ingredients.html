<!DOCTYPE html>
<html>
<head>
    <title>Ingredients - HealthyMe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef7f1;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f8f4d;
        }

        .item {
            background: #fff3f3;
            padding: 12px;
            border-left: 4px solid #e74c3c;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
        }

        .center {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Harmful Ingredients Found</h1>

        {% for item in harmful_items %}
            <div class="item">{{ item }}</div>
        {% empty %}
            <p>No harmful ingredients found yet.</p>
        {% endfor %}

        <div class="center">
            <a href="/dashboard/" class="btn">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
