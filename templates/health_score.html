<!DOCTYPE html>
<html>
<head>
    <title>Health Score - HealthyMe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef7f1;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f8f4d;
        }

        .item {
            background: #f8f8f8;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
        }

        .center {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Health Scores</h1>

        {% for scan in recent_scans %}
            <div class="item">
                <strong>{{ scan.product_name }}</strong><br>
                {% if scan.score is not None %}
                    Score: {{ scan.score }}% | {{ scan.status }}
                {% else %}
                    Score: N/A
                {% endif %}
                <br>
                <small>{{ scan.scanned_at }}</small>
            </div>
        {% empty %}
            <p>No scan history yet.</p>
        {% endfor %}

        <div class="center">
            <a href="/dashboard/" class="btn">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
