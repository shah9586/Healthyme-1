<!DOCTYPE html>
<html>
<head>
    <title>Verify Registration OTP - HealthyMe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef7f1;
        }

        .box {
            width: 380px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #27ae60;
        }

        p {
            text-align: center;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Verify Registration OTP</h2>
        <p>Enter the OTP sent to your email.</p>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
            <button type="submit">Verify OTP</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
